<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵 · 视频数据分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 水墨背景 -->
    <div class="ink-bg">
        <div class="ink-mist-1"></div>
        <div class="ink-mist-2"></div>
        <div class="ink-mountain"></div>
    </div>

    <!-- 侧边导航 -->
    <nav class="sidebar">
        <div class="brand">
            <div class="brand-seal">🎬</div>
            <div class="brand-text">
                <span class="brand-cn">墨韵数据</span>
                <span class="brand-en">INK · ANALYTICS</span>
            </div>
        </div>
        <div class="nav-items">
            <a href="#" class="nav-item active">
                <span class="nav-icon">📊</span>
                <span class="nav-label">数据总览</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🎬</span>
                <span class="nav-label">视频列表</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🏷️</span>
                <span class="nav-label">分类分析</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📈</span>
                <span class="nav-label">趋势报告</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">系统设置</span>
            </a>
        </div>
        <div class="nav-footer">
            <div class="user-profile">
                <div class="avatar">管</div>
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <span class="user-role">超级管理员</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 顶部 -->
        <header class="top-bar">
            <div class="header-left">
                <h1 class="page-title">数据总览</h1>
                <p class="page-subtitle">视频平台运营数据分析仪表板</p>
            </div>
            <div class="header-right">
                <div class="search-wrap">
                    <input type="text" placeholder="搜索视频..." class="search-input">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="header-time" id="headerTime"></div>
            </div>
        </header>

        <!-- 统计卡片 -->
        <section class="stats-grid">
            <div class="stat-card" data-delay="0">
                <div class="stat-icon stat-views">👁️</div>
                <div class="stat-body">
                    <span class="stat-label">总播放量</span>
                    <span class="stat-value" id="totalViews">—</span>
                    <span class="stat-trend up">↑ 较上周 +12.5%</span>
                </div>
            </div>
            <div class="stat-card" data-delay="100">
                <div class="stat-icon stat-videos">🎬</div>
                <div class="stat-body">
                    <span class="stat-label">视频总数</span>
                    <span class="stat-value" id="totalVideos">—</span>
                    <span class="stat-trend up">↑ 较上周 +8</span>
                </div>
            </div>
            <div class="stat-card" data-delay="200">
                <div class="stat-icon stat-likes">❤️</div>
                <div class="stat-body">
                    <span class="stat-label">总点赞数</span>
                    <span class="stat-value" id="totalLikes">—</span>
                    <span class="stat-trend up">↑ 较上周 +5.3%</span>
                </div>
            </div>
            <div class="stat-card" data-delay="300">
                <div class="stat-icon stat-time">⏱️</div>
                <div class="stat-body">
                    <span class="stat-label">平均观看时长</span>
                    <span class="stat-value" id="avgWatchTime">—</span>
                    <span class="stat-trend down">↓ 较上周 -0.8%</span>
                </div>
            </div>
        </section>

        <!-- 图表区 -->
        <section class="charts-section">
            <div class="chart-card chart-trend" data-delay="100">
                <div class="chart-head">
                    <h3><span class="ink-dot"></span> 播放趋势</h3>
                    <div class="chart-period">
                        <button class="period-btn active">近7日</button>
                        <button class="period-btn">近30日</button>
                        <button class="period-btn">近90日</button>
                    </div>
                </div>
                <div class="chart-body">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="chart-card chart-category" data-delay="200">
                <div class="chart-head">
                    <h3><span class="ink-dot"></span> 分类占比</h3>
                </div>
                <div class="chart-body">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </section>

        <!-- 排行榜 -->
        <section class="rank-section" data-delay="200">
            <div class="rank-head">
                <h3><span class="ink-dot"></span> 热门视频排行榜</h3>
                <span class="rank-more">查看全部 →</span>
            </div>
            <div class="rank-body">
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th class="col-rank">排名</th>
                            <th class="col-title">视频名称</th>
                            <th class="col-cat">分类</th>
                            <th class="col-num">播放量</th>
                            <th class="col-num">点赞数</th>
                            <th class="col-num">点赞率</th>
                            <th class="col-num">均播(分)</th>
                        </tr>
                    </thead>
                    <tbody id="rankBody">
                        <tr class="loading-row"><td colspan="7">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 底部 -->
        <footer class="site-footer">
            <p>© 2026 墨韵数据 · 视频分析平台</p>
            <p>数据每 5 分钟自动刷新</p>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
